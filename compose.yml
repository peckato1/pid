x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app: &app
  image: ghcr.io/peckato1/pid:${TAG:-local}
  build: .
  env_file: .env
  logging: *default-logging

services:
  postgis:
    image: docker.io/postgis/postgis:17-3.5
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:54322:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  migrate:
    <<: *app
    command: ["sh", "-c", "alembic upgrade head && touch /tmp/migrated && exec sleep infinity"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgis:5432/${APP_POSTGRES_DB}
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrated"]
      interval: 2s
      timeout: 2s
      retries: 60
    restart: unless-stopped

  trip-updates:
    <<: *app
    command: python pid_trip_updates.py --interval 45
    environment:
      DATABASE_URL: postgresql+psycopg://${APP_POSTGRES_RW_USER}:${APP_POSTGRES_RW_PASSWORD}@postgis:5432/${APP_POSTGRES_DB}
    depends_on:
      migrate:
        condition: service_healthy
    restart: unless-stopped

  vehicle-descriptors:
    <<: *app
    command: python pid_vehicle_descriptors.py
    environment:
      DATABASE_URL: postgresql+psycopg://${APP_POSTGRES_RW_USER}:${APP_POSTGRES_RW_PASSWORD}@postgis:5432/${APP_POSTGRES_DB}
    depends_on:
      migrate:
        condition: service_healthy
    restart: unless-stopped

  api:
    <<: *app
    command: python pid_api.py
    environment:
      DATABASE_URL: postgresql+psycopg://${APP_POSTGRES_RO_USER}:${APP_POSTGRES_RO_PASSWORD}@postgis:5432/${APP_POSTGRES_DB}
    depends_on:
      migrate:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    image: ghcr.io/peckato1/pid-proxy:${TAG:-local}
    build:
      context: .
      dockerfile: docker/proxy.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    logging: *default-logging

  gtfs-sync:
    <<: *app
    command: /usr/local/bin/cron-entrypoint.sh
    environment:
      DATABASE_URL: postgresql+psycopg://${APP_POSTGRES_RW_USER}:${APP_POSTGRES_RW_PASSWORD}@postgis:5432/${APP_POSTGRES_DB}
    volumes:
      - gtfs_archives:/gtfs_archives
    depends_on:
      migrate:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgis_data:
  gtfs_archives:
